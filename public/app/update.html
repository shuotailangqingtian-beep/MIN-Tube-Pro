<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SakuTube-Pro - システムアップデート</title>
    
    <!-- Markdownパース & GitHubスタイル -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

    <style>
        :root {
            --bg-color: #030303;
            --surface-color: #0f0f0f;
            --surface-hover: #212121;
            --border-color: #2d2d2d;
            --text-color: #f1f1f1;
            --text-muted: #aaaaaa;
            --accent-color: #3ea6ff;
            --success-color: #2ba640;
            --error-color: #ff4e45;
            --terminal-bg: #050505;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Tabs UI */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            background: rgba(255,255,255,0.02);
        }

        .content-panel { padding: 32px; display: none; }
        .content-panel.active { display: block; }

        .header { margin-bottom: 24px; }
        .brand { font-size: 12px; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; }
        h1 { font-size: 24px; font-weight: 500; margin-top: 4px; }

        /* Status Cards */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .status-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
        }
        .status-label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .status-value { font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px; }

        /* README View */
        .readme-container {
            background-color: #ffffff; /* Markdownは白背景で見やすく */
            color: #24292f;
            border-radius: 8px;
            padding: 24px;
            max-height: 500px;
            overflow-y: auto;
        }

        /* Message Boxes */
        .message-box {
            padding: 16px; border-radius: 6px; font-size: 14px; line-height: 1.5; margin-bottom: 20px;
        }
        .message-box.info { background: rgba(62, 166, 255, 0.1); border-left: 4px solid var(--accent-color); }
        .message-box.success { background: rgba(43, 166, 64, 0.1); border-left: 4px solid var(--success-color); }
        .message-box.error { background: rgba(255, 78, 69, 0.1); border-left: 4px solid var(--error-color); }

        /* Buttons */
        .btn {
            display: block; width: 100%; padding: 14px; border-radius: 24px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .btn-primary { background-color: var(--text-color); color: var(--bg-color); }
        .btn-primary:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

        /* Terminal UI (保持) */
        .terminal {
            background-color: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #39ff14; 
            height: 250px;
            overflow-y: hidden;
            position: relative;
        }
        .terminal-log {
            position: absolute; bottom: 16px; left: 16px; right: 16px;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .log-line.cyan { color: #00ffff; }
        .log-line.yellow { color: #ffff00; }
        .progress-bar-container { background: var(--border-color); height: 4px; border-radius: 2px; margin-top: 16px; overflow: hidden; }
        .progress-bar { background: var(--accent-color); height: 100%; width: 0%; transition: width 0.1s linear; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- タブメニュー -->
    <div class="tabs" id="tabBar">
        <button class="tab-btn active" onclick="switchTab('update')">アップデート</button>
        <button class="tab-btn" onclick="switchTab('readme')">更新内容 (README)</button>
    </div>

    <!-- パネル1: アップデート確認 -->
    <div id="panel-update" class="content-panel active">
        <div class="header">
            <div class="brand">SakuTube-Pro System</div>
            <h1>システムアップデート</h1>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <span class="status-label">現在のバージョン</span>
                <span id="currentVersion" class="status-value">取得中...</span>
            </div>
            <div class="status-card">
                <span class="status-label">最新のバージョン</span>
                <span id="latestVersion" class="status-value">取得中...</span>
            </div>
        </div>

        <div id="messageArea"></div>
        <button id="updateBtn" class="btn btn-primary" disabled>情報を確認中...</button>
    </div>

    <!-- パネル2: README表示 -->
    <div id="panel-readme" class="content-panel">
        <div class="header">
            <div class="brand">Documentation</div>
            <h1>最新のリポジトリ情報</h1>
        </div>
        <div id="readme-viewer" class="markdown-body readme-container">
            READMEを読み込んでいます...
        </div>
    </div>

    <!-- アップデート実行中画面 -->
    <div id="processScreen" class="content-panel">
        <div class="header text-center">
            <div class="brand">Installing Update</div>
            <h1>アップデートをインストール中...</h1>
        </div>
        <div class="terminal">
            <div id="terminalLog" class="terminal-log"></div>
        </div>
        <div class="progress-bar-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>
</div>

<script>
    // 定数設定
    const LOCAL_VERSION_URL = "./public/raw/version.json";
    const GITHUB_VERSION_URL = "https://raw.githubusercontent.com/mino-hobby-pro/SakuTube-Pro/main/public/raw/version.json";
    const GITHUB_README_URL = "https://raw.githubusercontent.com/mino-hobby-pro/SakuTube-Pro/main/README.md";

    let targetLatestVersion = "";
    let currentVersion = "";

    const commandTemplates = [
        "FETCH: GET /api/v1/updates/manifest.json [200 OK]",
        "HASH: Verifying SHA-256 checksum of remote objects...",
        "CLEAN: Initializing destructive environment wipe sequence...",
        "WIPE: localStorage.clear() invoked successfully.",
        "WIPE: sessionStorage flushed.",
        "WIPE: Unregistering ServiceWorkers...",
        "WIPE: Purging CacheStorage caches...",
        "WIPE: Dropping IndexedDB databases...",
        "DOWNLOAD: Fetching build patch_delta.bin...",
        "PACK: Unpacking core-modules.tar.gz [================>] 100%",
        "BUILD: Compiling production client assets...",
        "MINIFY: Optimizing bundle payload size...",
        "VERIFY: Initiating handshake with endpoint '/version'..."
    ];

    window.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    async function initApp() {
        await checkVersions();
        await fetchReadme();
    }

    // タブ切り替え
    function switchTab(tabId) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tabId}`).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // バージョンチェック (ローカル vs GitHub)
    async function checkVersions() {
        const curEl = document.getElementById('currentVersion');
        const latEl = document.getElementById('latestVersion');
        const btn = document.getElementById('updateBtn');
        const msg = document.getElementById('messageArea');

        try {
            // ローカルとリモートを同時に取得
            const [localRes, remoteRes] = await Promise.all([
                fetch(LOCAL_VERSION_URL).then(r => r.json()).catch(() => ({version: "Unknown"})),
                fetch(GITHUB_VERSION_URL).then(r => r.json())
            ]);

            currentVersion = localRes.version;
            targetLatestVersion = remoteRes.version;

            curEl.textContent = currentVersion;
            latEl.textContent = targetLatestVersion;

            if (currentVersion === targetLatestVersion) {
                msg.innerHTML = `<div class="message-box success">最新の状態です。アップデートの必要はありません。</div>`;
                btn.textContent = "最新バージョンです";
                btn.disabled = true;
            } else {
                msg.innerHTML = `<div class="message-box info">新しいバージョン <strong>${targetLatestVersion}</strong> が利用可能です。</div>`;
                btn.textContent = "今すぐアップデートを実行";
                btn.disabled = false;
                btn.onclick = confirmUpdate;
            }
        } catch (e) {
            msg.innerHTML = `<div class="message-box error">情報の取得に失敗しました。ネットワーク接続を確認してください。</div>`;
            btn.textContent = "再試行";
            btn.disabled = false;
            btn.onclick = checkVersions;
        }
    }

    // README取得
    async function fetchReadme() {
        const viewer = document.getElementById('readme-viewer');
        try {
            const res = await fetch(GITHUB_README_URL);
            const text = await res.text();
            viewer.innerHTML = marked.parse(text);
        } catch (e) {
            viewer.innerHTML = "READMEの読み込みに失敗しました。";
        }
    }

    // 削除確認
    function confirmUpdate() {
        if (confirm("アップデートを実行します。\nこのサイトに保存されたすべての情報（キャッシュ・設定等）が削除されます。よろしいですか？")) {
            if (confirm("【最終確認】本当にすべてのローカルデータを初期化してもよろしいですか？この操作は取り消せません。")) {
                runUpdateSequence();
            }
        }
    }

    // アップデートシーケンス (既存の強力な削除機能を継承)
    async function runUpdateSequence() {
        document.getElementById('panel-update').classList.remove('active');
        document.getElementById('tabBar').classList.add('hidden');
        document.getElementById('processScreen').classList.add('active');

        const logContainer = document.getElementById('terminalLog');
        const progressBar = document.getElementById('progressBar');

        // --- 物理的なデータ消去セクション (既存機能) ---
        try {
            localStorage.clear();
            sessionStorage.clear();
            const cookies = document.cookie.split(";");
            for (let i = 0; i < cookies.length; i++) {
                const name = cookies[i].split("=")[0].trim();
                document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
            }
            if (window.indexedDB && indexedDB.databases) {
                const dbs = await indexedDB.databases();
                dbs.forEach(db => indexedDB.deleteDatabase(db.name));
            }
            if (window.caches) {
                const names = await caches.keys();
                await Promise.all(names.map(n => caches.delete(n)));
            }
        } catch (e) { console.warn("Cleanup error:", e); }

        // --- ターミナル演出セクション (既存機能) ---
        const totalDuration = 5000;
        const intervalTime = 80;
        const totalSteps = totalDuration / intervalTime;
        let currentStep = 0;

        const interval = setInterval(() => {
            currentStep++;
            const progress = (currentStep / totalSteps) * 100;
            progressBar.style.width = `${progress}%`;

            const line = document.createElement('div');
            line.className = 'log-line';
            
            if (currentStep === 1) {
                line.textContent = "--> SYSTEM INITIALIZATION COMPLETED.";
                line.classList.add('cyan');
            } else if (currentStep === Math.floor(totalSteps * 0.2)) {
                line.textContent = "--> Wiping active storage grids... SUCCESS.";
                line.classList.add('yellow');
            } else {
                const template = commandTemplates[Math.floor(Math.random() * commandTemplates.length)];
                const hex = `0x${Math.floor(Math.random() * 16777215).toString(16).toUpperCase()}`;
                line.textContent = `[${hex}] ${template}`;
            }

            logContainer.appendChild(line);
            logContainer.parentElement.scrollTop = logContainer.parentElement.scrollHeight;

            if (currentStep >= totalSteps) {
                clearInterval(interval);
                verifyFinalVersion();
            }
        }, intervalTime);
    }

    // 最終確認
    async function verifyFinalVersion() {
        try {
            // アップデート後の最新情報を再確認 (本来ならここでページリロードが必要)
            alert("アップデートが完了しました。\n全てのデータが初期化され、最新バージョンが適用されました。");
            location.reload(); 
        } catch (e) {
            alert("検証中にエラーが発生しましたが、処理は完了しました。");
        }
    }
</script>
</body>
</html>
